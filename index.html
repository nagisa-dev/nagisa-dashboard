<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Dashboard">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.svg">
  <title>nagisa dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --accent: #22c55e;
      --bg: #0a0a0a;
      --card: #1a1a1a;
      --border: rgba(255,255,255,.1);
      --text: #f0f0f0;
      --muted: #666;
      --radius: 10px;
    }

    body {
      font-family: -apple-system, 'Hiragino Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
    }

    /* ── ログイン画面 ── */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 32px 24px;
      gap: 24px;
    }
    #login-screen h1 { font-size: 24px; font-weight: 700; letter-spacing: -.02em; }
    #login-screen p {
      font-size: 14px; color: var(--muted); text-align: center;
      line-height: 1.6; max-width: 280px;
    }
    #login-screen input {
      width: 100%; max-width: 320px; padding: 14px 16px;
      border: 1.5px solid var(--border); border-radius: var(--radius);
      font-size: 14px; font-family: monospace; background: var(--card); outline: none;
      color: var(--text);
    }
    #login-screen input:focus { border-color: var(--accent); }
    #login-screen button {
      width: 100%; max-width: 320px; padding: 14px;
      background: var(--accent); color: #fff; border: none;
      border-radius: var(--radius); font-size: 15px; font-weight: 600; cursor: pointer;
    }
    .error-msg { color: #dc2626; font-size: 13px; }

    /* ── メイン画面 ── */
    #main-screen { display: none; padding-bottom: 72px; }

    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px 0;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .header-top h1 { font-size: 18px; font-weight: 700; }
    .reload-btn {
      background: none; border: none; font-size: 20px;
      cursor: pointer; padding: 4px; color: var(--muted);
    }

    /* ── ページナビ（今日 / ボード） ── */
    .page-nav {
      display: flex; gap: 4px; margin-bottom: 12px;
    }
    .page-btn {
      flex: 1; padding: 8px 0;
      border-radius: 8px; font-size: 14px; font-weight: 600;
      border: 1.5px solid var(--border);
      background: none; color: var(--muted); cursor: pointer;
      transition: all .15s;
    }
    .page-btn.active {
      background: var(--accent); border-color: var(--accent); color: #fff;
    }

    /* フィルタータブ（ボードビュー用） */
    .filter-tabs {
      display: flex; gap: 4px; overflow-x: auto;
      scrollbar-width: none; padding-bottom: 1px;
    }
    .filter-tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0; padding: 7px 14px; border-radius: 20px;
      font-size: 13px; font-weight: 500; border: 1.5px solid var(--border);
      background: none; color: var(--muted); cursor: pointer; transition: all .15s;
    }
    .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ── カンバン ── */
    .board {
      padding: 16px; display: flex; flex-direction: column; gap: 16px;
    }
    .column {
      background: var(--card); border-radius: var(--radius);
      border: 1px solid var(--border); overflow: hidden;
    }
    .col-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; border-bottom: 1px solid var(--border);
    }
    .col-title { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; }
    .col-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .col-count { font-size: 12px; color: var(--muted); font-weight: 400; }
    .col-items { padding: 8px; display: flex; flex-direction: column; gap: 6px; }
    .col-empty { padding: 16px; text-align: center; font-size: 13px; color: var(--muted); }
    .item-card {
      padding: 12px 14px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--bg); cursor: pointer; transition: border-color .15s;
    }
    .item-card:active { opacity: .7; }
    .item-title { font-size: 14px; line-height: 1.5; font-weight: 500; }
    .item-meta { display: flex; align-items: center; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
    .item-num { font-size: 11px; color: var(--muted); font-family: monospace; }
    .item-label {
      font-size: 11px; padding: 2px 7px; border-radius: 10px; font-weight: 500;
    }

    /* ── 今日ビュー ── */
    #today-view { padding: 16px; display: none; }

    .today-date {
      font-size: 13px; color: var(--muted); margin-bottom: 16px; font-weight: 500;
    }

    .timeline { display: flex; flex-direction: column; gap: 2px; }

    .tl-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 10px 12px; border-radius: 10px;
      background: var(--card); border: 1px solid var(--border);
      cursor: pointer; transition: opacity .15s;
      position: relative;
    }
    .tl-item:active { opacity: .7; }
    .tl-item.done { opacity: .45; }
    .tl-item.done .tl-title { text-decoration: line-through; }

    .tl-time {
      flex-shrink: 0; width: 44px;
      font-size: 12px; color: var(--muted); font-family: monospace;
      padding-top: 2px; line-height: 1.4; text-align: right;
    }

    .tl-icon {
      flex-shrink: 0; width: 20px; text-align: center;
      font-size: 15px; padding-top: 1px;
    }

    .tl-body { flex: 1; min-width: 0; }
    .tl-title { font-size: 14px; font-weight: 500; line-height: 1.5; }
    .tl-meta {
      display: flex; align-items: center; gap: 6px; margin-top: 4px; flex-wrap: wrap;
    }
    .tl-duration { font-size: 11px; color: var(--muted); }
    .tl-label {
      font-size: 11px; padding: 1px 7px; border-radius: 8px; font-weight: 500;
    }

    .tl-check {
      flex-shrink: 0; width: 20px; height: 20px;
      border: 1.5px solid var(--border); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-top: 1px; transition: all .15s;
    }
    .tl-item.done .tl-check {
      background: var(--accent); border-color: var(--accent);
    }
    .tl-check-mark { display: none; font-size: 11px; color: #fff; }
    .tl-item.done .tl-check-mark { display: block; }

    /* 区切り線（時間帯の間） */
    .tl-gap {
      height: 8px;
    }

    /* 今日のポイント */
    .today-points {
      margin-top: 20px; padding: 14px 16px;
      background: var(--card); border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    .today-points-title {
      font-size: 11px; font-weight: 600; color: var(--accent);
      letter-spacing: .06em; text-transform: uppercase; margin-bottom: 8px;
    }
    .today-points ul { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .today-points li { font-size: 13px; line-height: 1.5; color: var(--text); padding-left: 12px; position: relative; }
    .today-points li::before { content: '・'; position: absolute; left: 0; color: var(--accent); }

    .today-empty {
      text-align: center; color: var(--muted); font-size: 14px;
      padding: 48px 16px; line-height: 1.8;
    }

    /* ── ローディング ── */
    #loading {
      display: none; flex-direction: column; align-items: center;
      justify-content: center; min-height: 60dvh;
      gap: 12px; color: var(--muted); font-size: 14px;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 2.5px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── ボトムナビ ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--card); border-top: 1px solid var(--border);
      display: none; /* ログイン後に表示 */
      justify-content: space-around; padding: 10px 16px 24px;
      z-index: 20;
    }
    .bottom-nav.visible { display: flex; }
    .nav-btn {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      background: none; border: none; cursor: pointer;
      padding: 4px 20px; border-radius: 10px;
      color: var(--muted); transition: color .15s;
    }
    .nav-btn.active { color: var(--accent); }
    .nav-icon { font-size: 20px; }
    .nav-label { font-size: 10px; font-weight: 600; letter-spacing: .04em; }

    /* ── ログアウト ── */
    .logout-btn {
      display: block; margin: 8px 16px 24px;
      padding: 10px; background: none; border: 1px solid var(--border);
      border-radius: 8px; font-size: 13px; color: var(--muted);
      cursor: pointer; width: calc(100% - 32px);
    }

    /* ── ボトムシート ── */
    #sheet-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.4); z-index: 100;
    }
    #sheet-overlay.open { display: block; }
    #bottom-sheet {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--card); border-radius: 20px 20px 0 0;
      padding: 20px 16px 40px; z-index: 101;
      transform: translateY(100%); transition: transform .25s ease;
    }
    #bottom-sheet.open { transform: translateY(0); }
    .sheet-handle {
      width: 36px; height: 4px; background: var(--border);
      border-radius: 2px; margin: 0 auto 16px;
    }
    .sheet-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; line-height: 1.4; }
    .sheet-num { font-size: 12px; color: var(--muted); font-family: monospace; margin-bottom: 16px; }
    .sheet-section-label {
      font-size: 11px; color: var(--muted); font-weight: 600;
      text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px;
    }
    .status-btns { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .status-btn {
      display: flex; align-items: center; gap: 10px; padding: 12px 14px;
      border-radius: 10px; border: 1.5px solid var(--border); background: var(--bg);
      font-size: 14px; font-weight: 500; cursor: pointer; transition: all .15s; text-align: left;
      color: var(--text);
    }
    .status-btn.current {
      border-color: var(--accent); background: rgba(34,197,94,.15); color: var(--accent);
    }
    .status-btn:active { opacity: .7; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .sheet-open-btn {
      display: block; width: 100%; padding: 12px; background: none;
      border: 1px solid var(--border); border-radius: 10px;
      font-size: 14px; color: var(--muted); cursor: pointer; text-align: center;
    }
    .updating-overlay {
      position: absolute; inset: 0; background: rgba(255,255,255,.7);
      display: flex; align-items: center; justify-content: center;
      border-radius: 20px 20px 0 0; font-size: 14px; color: var(--accent); gap: 8px;
    }
  </style>
</head>
<body>

<!-- ログイン画面 -->
<div id="login-screen">
  <h1>nagisa dashboard</h1>
  <p>GitHub Personal Access Token を入力してください。<br>次回以降は自動でログインします。</p>
  <input type="password" id="pat-input" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off">
  <div id="login-error" class="error-msg" style="display:none;">トークンが正しくないか、権限が不足しています</div>
  <button id="login-btn">ログイン</button>
</div>

<!-- メイン画面 -->
<div id="main-screen">
  <header>
    <div class="header-top">
      <h1>nagisa dashboard</h1>
      <button class="reload-btn" id="reload-btn" title="更新">↻</button>
    </div>

    <!-- フィルタータブ（ボードビュー時のみ表示） -->
    <div class="filter-tabs" id="filter-tabs">
      <button class="tab active" data-label="">すべて</button>
      <button class="tab" data-label="domain:プロポーズ">💍 プロポーズ</button>
      <button class="tab" data-label="domain:仕事">💼 仕事</button>
      <button class="tab" data-label="domain:生活">🏠 生活</button>
      <button class="tab" data-label="domain:作る">🛠 作る</button>
    </div>
  </header>

  <div id="loading">
    <div class="spinner"></div>
    <span>読み込み中...</span>
  </div>

  <!-- ボードビュー -->
  <div class="board" id="board"></div>

  <!-- 今日ビュー -->
  <div id="today-view"></div>

  <button class="logout-btn" id="logout-btn">ログアウト（トークンを削除）</button>
</div>

<!-- ボトムナビ -->
<nav class="bottom-nav" id="bottom-nav">
  <button class="nav-btn active" id="nav-today" data-page="today">
    <span class="nav-icon">☀️</span>
    <span class="nav-label">今日</span>
  </button>
  <button class="nav-btn" id="nav-board" data-page="board">
    <span class="nav-icon">📋</span>
    <span class="nav-label">ボード</span>
  </button>
</nav>

<!-- ボトムシート（ボード用） -->
<div id="sheet-overlay"></div>
<div id="bottom-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title" id="sheet-title"></div>
  <div class="sheet-num" id="sheet-num"></div>
  <div class="sheet-section-label">ステータスを変更</div>
  <div class="status-btns" id="status-btns"></div>
  <button class="sheet-open-btn" id="sheet-open-btn">GitHubで開く ↗</button>
</div>

<script>
const COLUMNS = [
  { id: '192c46ec', name: 'To Do Inbox',    dot: '#aaa',    label: '新着' },
  { id: 'ac98ce85', name: 'To Do Priority', dot: '#3b82f6', label: '今週' },
  { id: 'dc287443', name: 'Pending',        dot: '#f59e0b', label: '待ち' },
  { id: '894f06ed', name: 'In Progress',    dot: '#f97316', label: '作業中' },
  { id: 'b43841e5', name: 'Done',           dot: '#16A34A', label: '完了' },
];

const LABEL_COLORS = {
  'domain:プロポーズ': { bg: 'rgba(157,23,77,.2)',  color: '#f9a8d4' },
  'domain:仕事':       { bg: 'rgba(30,64,175,.2)',  color: '#93c5fd' },
  'domain:生活':       { bg: 'rgba(6,95,70,.2)',    color: '#6ee7b7' },
  'domain:作る':       { bg: 'rgba(91,33,182,.2)',  color: '#c4b5fd' },
};

const SCHEDULE_LABEL_COLORS = {
  work:     { bg: 'rgba(30,64,175,.25)',   color: '#93c5fd' },
  note:     { bg: 'rgba(124,58,237,.25)',  color: '#c4b5fd' },
  life:     { bg: 'rgba(6,95,70,.25)',     color: '#6ee7b7' },
  proposal: { bg: 'rgba(157,23,77,.25)',   color: '#f9a8d4' },
};

let allItems = [];
let currentLabel = '';
let projectId = '';
let statusFieldId = '';
let selectedItem = null;
let currentPage = 'today'; // 'today' | 'board'

// ── 起動処理 ──
const pat = localStorage.getItem('gh_pat');
if (pat) showMain(pat);
else showLogin();

function showLogin() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('main-screen').style.display = 'none';
  document.getElementById('bottom-nav').classList.remove('visible');
}

function showMain(token) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = 'block';
  document.getElementById('bottom-nav').classList.add('visible');
  switchPage('today');
  fetchTodaySchedule(token);
  fetchData(token);
}

// ── ページ切り替え ──
function switchPage(page) {
  currentPage = page;

  const todayView   = document.getElementById('today-view');
  const board       = document.getElementById('board');
  const filterTabs  = document.getElementById('filter-tabs');
  const logoutBtn   = document.getElementById('logout-btn');

  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`nav-${page}`).classList.add('active');

  if (page === 'today') {
    todayView.style.display  = 'block';
    board.style.display      = 'none';
    filterTabs.style.display = 'none';
    logoutBtn.style.display  = 'none';
  } else {
    todayView.style.display  = 'none';
    board.style.display      = 'flex';
    filterTabs.style.display = 'flex';
    logoutBtn.style.display  = 'block';
  }
}

document.getElementById('bottom-nav').addEventListener('click', e => {
  const btn = e.target.closest('.nav-btn');
  if (!btn) return;
  switchPage(btn.dataset.page);
});

// ── ログイン ──
document.getElementById('login-btn').addEventListener('click', async () => {
  const token = document.getElementById('pat-input').value.trim();
  if (!token) return;
  document.getElementById('login-btn').textContent = '確認中...';
  const ok = await fetchData(token);
  if (ok) {
    localStorage.setItem('gh_pat', token);
    showMain(token);
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('login-btn').textContent = 'ログイン';
  }
});

// ── 今日スケジュール取得 ──
async function fetchTodaySchedule(token) {
  const view = document.getElementById('today-view');
  view.innerHTML = '<div id="loading" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:40dvh;gap:12px;color:var(--muted);font-size:14px;"><div class="spinner"></div><span>スケジュール読み込み中...</span></div>';

  try {
    const res = await fetch(
      'https://api.github.com/repos/nagisa-dev/furuta-database/contents/output/today-schedule.json',
      { headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github.v3+json' } }
    );
    if (!res.ok) throw new Error('fetch failed');
    const meta = await res.json();
    const json = JSON.parse(atob(meta.content.replace(/\n/g, '')));
    renderTimeline(json);
  } catch (e) {
    view.innerHTML = '<div class="today-empty">スケジュールが見つかりません。<br>「おはよう」と話しかけて生成してください。</div>';
  }
}

// ── タイムライン描画 ──
function renderTimeline(data) {
  const view = document.getElementById('today-view');
  const today = new Date().toISOString().slice(0, 10);
  const doneKey = `schedule_done_${data.date}`;
  let doneSet = new Set(JSON.parse(localStorage.getItem(doneKey) || '[]'));

  const dow = ['日','月','火','水','木','金','土'];
  const d = new Date(data.date + 'T00:00:00');
  const dateLabel = `${data.date}（${dow[d.getDay()]}）`;
  const isToday = data.date === today;

  let html = `<div class="today-date">${dateLabel}${isToday ? '' : ' <span style="color:#f59e0b;font-size:11px;">※過去のデータ</span>'}</div>`;
  html += '<div class="timeline">';

  let prevEnd = null;
  data.items.forEach((item, i) => {
    // 大きな時間の空白があれば区切り線
    if (prevEnd && item.start) {
      const gap = timeToMin(item.start) - timeToMin(prevEnd);
      if (gap > 30) html += '<div class="tl-gap"></div>';
    }
    prevEnd = item.end || prevEnd;

    const isDone = doneSet.has(i);
    const icon = item.type === 'event' ? '📌' : item.type === 'meal' ? '🍴' : '◻';
    const labelStyle = item.label && SCHEDULE_LABEL_COLORS[item.label]
      ? `background:${SCHEDULE_LABEL_COLORS[item.label].bg};color:${SCHEDULE_LABEL_COLORS[item.label].color}`
      : '';
    const labelHtml = item.label
      ? `<span class="tl-label" style="${labelStyle}">#${item.label}</span>` : '';
    const checkHtml = item.type === 'task'
      ? `<div class="tl-check"><span class="tl-check-mark">✓</span></div>` : '';

    html += `
      <div class="tl-item${isDone ? ' done' : ''}" data-index="${i}" data-type="${item.type}">
        <div class="tl-time">${item.start || ''}</div>
        <div class="tl-icon">${icon}</div>
        <div class="tl-body">
          <div class="tl-title">${item.title}</div>
          <div class="tl-meta">
            <span class="tl-duration">${item.duration}min</span>
            ${labelHtml}
          </div>
        </div>
        ${checkHtml}
      </div>`;
  });

  html += '</div>';

  if (data.points && data.points.length > 0) {
    const pts = data.points.map(p => `<li>${p}</li>`).join('');
    html += `
      <div class="today-points">
        <div class="today-points-title">今日のポイント</div>
        <ul>${pts}</ul>
      </div>`;
  }

  view.innerHTML = html;

  // タスクのチェックトグル
  view.querySelectorAll('.tl-item[data-type="task"]').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.index);
      if (doneSet.has(idx)) doneSet.delete(idx);
      else doneSet.add(idx);
      localStorage.setItem(doneKey, JSON.stringify([...doneSet]));
      el.classList.toggle('done');
    });
  });
}

function timeToMin(t) {
  if (!t) return 0;
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}

// ── GitHub Projectデータ取得 ──
async function fetchData(token) {
  if (currentPage === 'board') {
    document.getElementById('loading').style.display = 'flex';
    document.getElementById('board').style.display = 'none';
  }

  const query = `{
    user(login: "nagisa-dev") {
      projectV2(number: 1) {
        id
        fields(first: 20) {
          nodes {
            ... on ProjectV2SingleSelectField { id name }
          }
        }
        items(first: 100) {
          nodes {
            id
            content {
              ... on Issue {
                title number url
                labels(first: 5) { nodes { name color } }
              }
            }
            fieldValues(first: 10) {
              nodes {
                ... on ProjectV2ItemFieldSingleSelectValue {
                  optionId
                  field { ... on ProjectV2SingleSelectField { name } }
                }
              }
            }
          }
        }
      }
    }
  }`;

  try {
    const res = await fetch('https://api.github.com/graphql', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ query }),
    });
    const data = await res.json();
    if (data.errors || !data.data?.user?.projectV2) {
      document.getElementById('loading').style.display = 'none';
      return false;
    }
    const pj = data.data.user.projectV2;
    projectId = pj.id;
    const statusField = pj.fields.nodes.find(f => f.name === 'Status');
    if (statusField) statusFieldId = statusField.id;
    allItems = pj.items.nodes.filter(n => n.content?.title);
    if (currentPage === 'board') renderBoard();
    else { document.getElementById('loading').style.display = 'none'; }
    return true;
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    return false;
  }
}

// ── ボード描画 ──
function renderBoard() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('board').style.display = 'flex';

  const filtered = currentLabel
    ? allItems.filter(item => item.content.labels?.nodes.some(l => l.name === currentLabel))
    : allItems;

  const byStatus = {};
  COLUMNS.forEach(c => byStatus[c.id] = []);
  filtered.forEach(item => {
    const sf = item.fieldValues.nodes.find(fv => fv.field?.name === 'Status');
    const optId = sf?.optionId || '192c46ec';
    if (byStatus[optId] !== undefined) byStatus[optId].push(item);
  });

  const board = document.getElementById('board');
  board.innerHTML = '';

  COLUMNS.forEach(col => {
    const items = byStatus[col.id] || [];
    const colEl = document.createElement('div');
    colEl.className = 'column';
    colEl.innerHTML = `
      <div class="col-header">
        <div class="col-title">
          <div class="col-dot" style="background:${col.dot}"></div>
          ${col.name}
        </div>
        <span class="col-count">${items.length}</span>
      </div>
      <div class="col-items" id="col-${col.id}"></div>`;
    board.appendChild(colEl);

    const colItems = colEl.querySelector(`#col-${col.id}`);
    if (items.length === 0) {
      colItems.innerHTML = '<div class="col-empty">なし</div>';
    } else {
      items.forEach(item => {
        const labels = item.content.labels?.nodes || [];
        const labelHtml = labels.map(l => {
          const s = LABEL_COLORS[l.name]
            ? `background:${LABEL_COLORS[l.name].bg};color:${LABEL_COLORS[l.name].color}`
            : `background:rgba(255,255,255,.1);color:#999`;
          return `<span class="item-label" style="${s}">${l.name}</span>`;
        }).join('');
        const currentOptId = item.fieldValues.nodes.find(fv => fv.field?.name === 'Status')?.optionId || '192c46ec';
        const card = document.createElement('div');
        card.className = 'item-card';
        card.innerHTML = `
          <div class="item-title">${item.content.title}</div>
          <div class="item-meta">
            <span class="item-num">#${item.content.number}</span>
            ${labelHtml}
          </div>`;
        card.addEventListener('click', () => openSheet(item, currentOptId));
        colItems.appendChild(card);
      });
    }
  });
}

// ── ボトムシート ──
function openSheet(item, currentOptId) {
  selectedItem = item;
  document.getElementById('sheet-title').textContent = item.content.title;
  document.getElementById('sheet-num').textContent = `#${item.content.number}`;
  document.getElementById('sheet-open-btn').onclick = () => window.open(item.content.url, '_blank');

  const btns = document.getElementById('status-btns');
  btns.innerHTML = '';
  COLUMNS.forEach(col => {
    const btn = document.createElement('button');
    btn.className = 'status-btn' + (col.id === currentOptId ? ' current' : '');
    btn.innerHTML = `<div class="status-dot" style="background:${col.dot}"></div>${col.name}`;
    if (col.id !== currentOptId) btn.addEventListener('click', () => updateStatus(item, col.id));
    btns.appendChild(btn);
  });

  document.getElementById('sheet-overlay').classList.add('open');
  document.getElementById('bottom-sheet').classList.add('open');
}

function closeSheet() {
  document.getElementById('sheet-overlay').classList.remove('open');
  document.getElementById('bottom-sheet').classList.remove('open');
}
document.getElementById('sheet-overlay').addEventListener('click', closeSheet);

// ── ステータス更新 ──
async function updateStatus(item, newOptId) {
  const token = localStorage.getItem('gh_pat');
  if (!token || !projectId || !statusFieldId) return;

  const sheet = document.getElementById('bottom-sheet');
  const overlay = document.createElement('div');
  overlay.className = 'updating-overlay';
  overlay.innerHTML = '<div class="spinner"></div> 更新中...';
  sheet.appendChild(overlay);

  const mutation = `
    mutation {
      updateProjectV2ItemFieldValue(input: {
        projectId: "${projectId}"
        itemId: "${item.id}"
        fieldId: "${statusFieldId}"
        value: { singleSelectOptionId: "${newOptId}" }
      }) { projectV2Item { id } }
    }`;

  try {
    const res = await fetch('https://api.github.com/graphql', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: mutation }),
    });
    const data = await res.json();
    if (!data.errors) {
      const fv = item.fieldValues.nodes.find(f => f.field?.name === 'Status');
      if (fv) fv.optionId = newOptId;
      closeSheet();
      renderBoard();
    } else {
      overlay.textContent = '更新に失敗しました';
      setTimeout(() => overlay.remove(), 2000);
    }
  } catch (e) {
    overlay.textContent = '通信エラー';
    setTimeout(() => overlay.remove(), 2000);
  }
}

// ── フィルタータブ ──
document.getElementById('filter-tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  currentLabel = tab.dataset.label;
  renderBoard();
});

// ── 更新ボタン ──
document.getElementById('reload-btn').addEventListener('click', () => {
  const token = localStorage.getItem('gh_pat');
  if (!token) return;
  if (currentPage === 'today') fetchTodaySchedule(token);
  else fetchData(token);
});

// ── ログアウト ──
document.getElementById('logout-btn').addEventListener('click', () => {
  if (confirm('トークンを削除してログアウトしますか？')) {
    localStorage.removeItem('gh_pat');
    location.reload();
  }
});
</script>
