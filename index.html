<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Dashboard">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.svg">
  <title>nagisa dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --accent: #16A34A;
      --bg: #f5f5f5;
      --card: #ffffff;
      --border: rgba(0,0,0,.08);
      --text: #111;
      --muted: #888;
      --radius: 10px;
    }

    body {
      font-family: -apple-system, 'Hiragino Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
    }

    /* ── ログイン画面 ── */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 32px 24px;
      gap: 24px;
    }
    #login-screen h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -.02em;
    }
    #login-screen p {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
      max-width: 280px;
    }
    #login-screen input {
      width: 100%;
      max-width: 320px;
      padding: 14px 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 14px;
      font-family: monospace;
      background: var(--card);
      outline: none;
    }
    #login-screen input:focus { border-color: var(--accent); }
    #login-screen button {
      width: 100%;
      max-width: 320px;
      padding: 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    .error-msg { color: #dc2626; font-size: 13px; }

    /* ── メイン画面 ── */
    #main-screen { display: none; }

    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px 0;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .header-top h1 { font-size: 18px; font-weight: 700; }
    .reload-btn {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
      color: var(--muted);
    }

    /* フィルタータブ */
    .filter-tabs {
      display: flex;
      gap: 4px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 1px;
    }
    .filter-tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0;
      padding: 7px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      border: 1.5px solid var(--border);
      background: none;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
    }
    .tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── カンバン ── */
    .board {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .column {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .col-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .col-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
    }
    .col-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .col-count {
      font-size: 12px;
      color: var(--muted);
      font-weight: 400;
    }

    .col-items { padding: 8px; display: flex; flex-direction: column; gap: 6px; }
    .col-empty { padding: 16px; text-align: center; font-size: 13px; color: var(--muted); }

    .item-card {
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      cursor: pointer;
      transition: border-color .15s;
    }
    .item-card:active { opacity: .7; }
    .item-title { font-size: 14px; line-height: 1.5; font-weight: 500; }
    .item-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
      flex-wrap: wrap;
    }
    .item-num { font-size: 11px; color: var(--muted); font-family: monospace; }
    .item-label {
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 10px;
      font-weight: 500;
    }

    /* ── ローディング ── */
    #loading {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60dvh;
      gap: 12px;
      color: var(--muted);
      font-size: 14px;
    }
    .spinner {
      width: 28px;
      height: 28px;
      border: 2.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── ログアウトボタン ── */
    .logout-btn {
      display: block;
      margin: 8px 16px 24px;
      padding: 10px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      width: calc(100% - 32px);
    }
  </style>
</head>
<body>

<!-- ログイン画面 -->
<div id="login-screen">
  <h1>nagisa dashboard</h1>
  <p>GitHub Personal Access Token を入力してください。<br>次回以降は自動でログインします。</p>
  <input type="password" id="pat-input" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off">
  <div id="login-error" class="error-msg" style="display:none;">トークンが正しくないか、権限が不足しています</div>
  <button id="login-btn">ログイン</button>
</div>

<!-- メイン画面 -->
<div id="main-screen">
  <header>
    <div class="header-top">
      <h1>nagisa dashboard</h1>
      <button class="reload-btn" id="reload-btn" title="更新">↻</button>
    </div>
    <div class="filter-tabs" id="filter-tabs">
      <button class="tab active" data-label="">すべて</button>
      <button class="tab" data-label="domain:プロポーズ">💍 プロポーズ</button>
      <button class="tab" data-label="domain:仕事">💼 仕事</button>
      <button class="tab" data-label="domain:生活">🏠 生活</button>
      <button class="tab" data-label="domain:作る">🛠 作る</button>
    </div>
  </header>

  <div id="loading">
    <div class="spinner"></div>
    <span>読み込み中...</span>
  </div>

  <div class="board" id="board"></div>
  <button class="logout-btn" id="logout-btn">ログアウト（トークンを削除）</button>
</div>

<script>
const COLUMNS = [
  { id: '192c46ec', name: 'To Do Inbox',    dot: '#aaa',     label: '新着' },
  { id: 'ac98ce85', name: 'To Do Priority', dot: '#3b82f6',  label: '今週' },
  { id: 'dc287443', name: 'Pending',        dot: '#f59e0b',  label: '待ち' },
  { id: '894f06ed', name: 'In Progress',    dot: '#f97316',  label: '作業中' },
  { id: 'b43841e5', name: 'Done',           dot: '#16A34A',  label: '完了' },
];

const LABEL_COLORS = {
  'domain:プロポーズ': { bg: '#fce7f3', color: '#9d174d' },
  'domain:仕事':       { bg: '#dbeafe', color: '#1e40af' },
  'domain:生活':       { bg: '#d1fae5', color: '#065f46' },
  'domain:作る':       { bg: '#ede9fe', color: '#5b21b6' },
};

let allItems = [];
let currentLabel = '';

// ── 起動処理 ──
const pat = localStorage.getItem('gh_pat');
if (pat) showMain(pat);
else showLogin();

function showLogin() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('main-screen').style.display = 'none';
}

function showMain(token) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = 'block';
  fetchData(token);
}

// ── ログイン ──
document.getElementById('login-btn').addEventListener('click', async () => {
  const token = document.getElementById('pat-input').value.trim();
  if (!token) return;
  document.getElementById('login-btn').textContent = '確認中...';
  const ok = await fetchData(token);
  if (ok) {
    localStorage.setItem('gh_pat', token);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'block';
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('login-btn').textContent = 'ログイン';
  }
});

// ── データ取得 ──
async function fetchData(token) {
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('board').style.display = 'none';

  const query = `{
    user(login: "nagisa-dev") {
      projectV2(number: 1) {
        items(first: 100) {
          nodes {
            id
            content {
              ... on Issue {
                title
                number
                url
                labels(first: 5) { nodes { name color } }
              }
            }
            fieldValues(first: 10) {
              nodes {
                ... on ProjectV2ItemFieldSingleSelectValue {
                  optionId
                  field { ... on ProjectV2SingleSelectField { name } }
                }
              }
            }
          }
        }
      }
    }
  }`;

  try {
    const res = await fetch('https://api.github.com/graphql', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ query }),
    });
    const data = await res.json();
    if (data.errors || !data.data?.user?.projectV2) {
      document.getElementById('loading').style.display = 'none';
      return false;
    }
    allItems = data.data.user.projectV2.items.nodes.filter(n => n.content?.title);
    renderBoard();
    return true;
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    return false;
  }
}

// ── ボード描画 ──
function renderBoard() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('board').style.display = 'flex';

  const filtered = currentLabel
    ? allItems.filter(item =>
        item.content.labels?.nodes.some(l => l.name === currentLabel)
      )
    : allItems;

  const byStatus = {};
  COLUMNS.forEach(c => byStatus[c.id] = []);

  filtered.forEach(item => {
    const statusField = item.fieldValues.nodes.find(
      fv => fv.field?.name === 'Status'
    );
    const optId = statusField?.optionId || '192c46ec';
    if (byStatus[optId] !== undefined) byStatus[optId].push(item);
  });

  const board = document.getElementById('board');
  board.innerHTML = '';

  COLUMNS.forEach(col => {
    const items = byStatus[col.id] || [];
    const colEl = document.createElement('div');
    colEl.className = 'column';
    colEl.innerHTML = `
      <div class="col-header">
        <div class="col-title">
          <div class="col-dot" style="background:${col.dot}"></div>
          ${col.name}
        </div>
        <span class="col-count">${items.length}</span>
      </div>
      <div class="col-items" id="col-${col.id}"></div>
    `;
    board.appendChild(colEl);

    const colItems = colEl.querySelector(`#col-${col.id}`);
    if (items.length === 0) {
      colItems.innerHTML = '<div class="col-empty">なし</div>';
    } else {
      items.forEach(item => {
        const labels = item.content.labels?.nodes || [];
        const labelHtml = labels.map(l => {
          const style = LABEL_COLORS[l.name]
            ? `background:${LABEL_COLORS[l.name].bg};color:${LABEL_COLORS[l.name].color}`
            : `background:#f0f0f0;color:#555`;
          return `<span class="item-label" style="${style}">${l.name}</span>`;
        }).join('');

        const card = document.createElement('div');
        card.className = 'item-card';
        card.innerHTML = `
          <div class="item-title">${item.content.title}</div>
          <div class="item-meta">
            <span class="item-num">#${item.content.number}</span>
            ${labelHtml}
          </div>
        `;
        card.addEventListener('click', () => {
          window.open(item.content.url, '_blank');
        });
        colItems.appendChild(card);
      });
    }
  });
}

// ── フィルタータブ ──
document.getElementById('filter-tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  currentLabel = tab.dataset.label;
  renderBoard();
});

// ── 更新ボタン ──
document.getElementById('reload-btn').addEventListener('click', () => {
  const token = localStorage.getItem('gh_pat');
  if (token) fetchData(token);
});

// ── ログアウト ──
document.getElementById('logout-btn').addEventListener('click', () => {
  if (confirm('トークンを削除してログアウトしますか？')) {
    localStorage.removeItem('gh_pat');
    location.reload();
  }
});
</script>
</body>
</html>
